<!DOCTYPE html>
<html lang="cs" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Bakix{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='bakix.svg') }}" type="image/svg+xml">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="theme-color" content="#b5451b">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="{{ url_for('static', filename='style/base.css') }}">
  {% block extra_head %}{% endblock %}
</head>
<body>

  <header class="header">
    <a class="header__logo" href="/">
      <img src="{{ url_for('static', filename='bakix.svg') }}" alt="Bakix logo" class="header__logo-img">
      <span class="header__logo-text">Bakix</span>
    </a>
    <div class="header__actions">
      {% block header_actions %}{% endblock %}
      <button class="btn btn--icon" id="theme-toggle" title="Přepnout téma" aria-label="Přepnout téma">
        <span id="theme-icon">◐</span>
      </button>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/base.js') }}"></script>

  {% block scripts %}{% endblock %}



</body>
</html>
