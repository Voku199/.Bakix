{% extends "base.html" %}
{% block title %}{{ _('Bakix — Chyba přihlášení') }}{% endblock %}
{% block meta_robots %}noindex, nofollow{% endblock %}

{% block content %}
<div style="max-width:420px;margin:12vh auto 0;text-align:center;">
  <div style="background:var(--bg2,#fff);border:1px solid var(--border,#cec7bc);border-radius:16px;padding:32px 28px;">
    <div style="font-size:40px;margin-bottom:10px;">⚠️</div>
    <h1 style="font-size:20px;margin:0 0 8px;">{{ _('Přihlášení nelze dokončit') }}</h1>
    <p style="color:var(--muted,#6b6560);font-size:14px;margin:0 0 20px;">{{ message }}</p>
    <a href="{{ url_for('bakalari.index') }}" style="font-weight:700;">{{ _('Zpět do Bakixu') }}</a>
  </div>
</div>
{% endblock %}
