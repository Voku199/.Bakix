{% extends "base.html" %}

{% block title %}Prompt — Bakix{% endblock %}

{% block extra_head %}
<style>
  .prompt-wrapper {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    padding: 1.5rem 0;
  }

  .prompt-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.75rem;
  }

  .prompt-header h1 {
    font-size: 1.25rem;
    margin: 0;
  }

  .prompt-content {
    width: 100%;
    min-height: 60vh;
    resize: vertical;
    font-family: "Space Mono", monospace;
    font-size: 0.85rem;
    line-height: 1.6;
    padding: 1rem;
    box-sizing: border-box;
    border: 1px solid var(--color-border, #333);
    border-radius: 6px;
    background: var(--color-surface, #1a1a1a);
    color: var(--color-text, #eee);
    white-space: pre-wrap;
    overflow-y: auto;
  }

  .btn--copy {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    border: 1px solid var(--color-border, #555);
    background: var(--color-surface, #1a1a1a);
    color: var(--color-text, #eee);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    transition: background 0.15s;
  }

  .btn--copy:hover {
    background: var(--color-hover, #2a2a2a);
  }

  .btn--copy.copied {
    color: #4caf50;
    border-color: #4caf50;
  }
</style>
{% endblock %}

{% block content %}
<div class="prompt-wrapper">
  <div class="prompt-header">
    <h1>macaly.txt</h1>
    <button class="btn--copy" id="copy-btn" onclick="copyPrompt()">
      <span id="copy-icon">⎘</span>
      <span id="copy-label">Kopírovat</span>
    </button>
  </div>

  <textarea
    id="prompt-text"
    class="prompt-content"
    readonly
    spellcheck="false"
    aria-label="Obsah macaly.txt"
  >{{ content }}</textarea>
</div>
{% endblock %}

{% block scripts %}
<script>
  function copyPrompt() {
    const text = document.getElementById("prompt-text").value;
    navigator.clipboard.writeText(text).then(() => {
      const btn   = document.getElementById("copy-btn");
      const icon  = document.getElementById("copy-icon");
      const label = document.getElementById("copy-label");
      btn.classList.add("copied");
      icon.textContent  = "✓";
      label.textContent = "Zkopírováno!";
      setTimeout(() => {
        btn.classList.remove("copied");
        icon.textContent  = "⎘";
        label.textContent = "Kopírovat";
      }, 2000);
    });
  }
</script>
{% endblock %}
