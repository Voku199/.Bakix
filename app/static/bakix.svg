<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 480" role="img" aria-labelledby="title desc">
  <title id="title">Bakix</title>
  <desc id="desc">Bakix logo in a hex badge style with transparent background.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b5451b"/>
      <stop offset="100%" stop-color="#922b21"/>
    </linearGradient>
  </defs>


  <g transform="translate(340,210)">
    <!-- Outer hex ring -->
    <polygon points="0,-128 110.85,-64 110.85,64 0,128 -110.85,64 -110.85,-64" fill="#f0ebe3"/>
    <polygon points="0,-96 83.14,-48 83.14,48 0,96 -83.14,48 -83.14,-48" fill="url(#bgGrad)"/>

    <!-- Stylized B-like mark inspired by the reference icon -->
    <path d="M -44 56 L -44 -28 Q -44 -62 -12 -62 L 16 -62 Q 41 -62 41 -40 Q 41 -28 31 -20 Q 47 -10 47 8 Q 47 38 16 38 L -4 38"
          fill="none"
          stroke="#f0ebe3"
          stroke-width="21"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- Inner accent stroke using existing palette -->
    <path d="M 12 -17 L 31 -6 L 13 6 L 30 18 L 10 30"
          fill="none"
          stroke="#b5451b"
          stroke-width="9"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <text x="340" y="366" text-anchor="middle" font-family="Space Mono,Courier New,monospace" font-size="22" font-weight="700" letter-spacing="8" fill="#f0ebe3">BAKIX</text>
  <text x="340" y="392" text-anchor="middle" font-family="Space Mono,Courier New,monospace" font-size="11" font-weight="400" letter-spacing="1" fill="#6b6560">Bakalare, ale chytre.</text>
</svg>
