<article style='font-family:sans-serif;max-width:680px;margin:0 auto;line-height:1.7'><h1 style='color:#2c3e50'>Procvičovací test</h1><section>Tento krátký test ti pomůže ověřit tvou připravenost. Odpověz na otázky níže a zkontroluj své výsledky.</section><hr><section id='quiz'><div class='q'><p>1. Jaká je hlavní jednotka délky v soustavě SI?</p><label><input type='radio' name='q1' value='false'> Kilometr</label><br><label><input type='radio' name='q1' value='true'> Metr</label><br><label><input type='radio' name='q1' value='false'> Centimetr</label></div><div class='q'><p>2. Který plyn je nezbytný pro dýchání člověka?</p><label><input type='radio' name='q2' value='false'> Oxid uhličitý</label><br><label><input type='radio' name='q2' value='true'> Kyslík</label><br><label><input type='radio' name='q2' value='false'> Dusík</label></div><div class='q'><p>3. Kdo napsal dílo Babička?</p><label><input type='radio' name='q3' value='true'> Božena Němcová</label><br><label><input type='radio' name='q3' value='false'> Karel Jaromír Erben</label><br><label><input type='radio' name='q3' value='false'> Jan Neruda</label></div></section><br><button onclick='checkQuiz()' style='padding:10px 20px;background:#3498db;color:white;border:none;cursor:pointer'>Zkontrolovat odpovědi</button><p id='result'></p><hr><section id='notes'><h2>Moje poznámky</h2><textarea placeholder='Zapiš si klíčové pojmy...' style='width:100%;min-height:80px'></textarea></section><script>function checkQuiz(){const correct = [true, true, true]; const inputs = [document.querySelectorAll('input[name="q1"]'), document.querySelectorAll('input[name="q2"]'), document.querySelectorAll('input[name="q3"]')]; let score = 0; inputs.forEach((q, i) => { q.forEach(input => { if(input.checked && input.value === 'true') score++; }); }); document.getElementById('result').innerText = 'Tvůj výsledek: ' + score + '/3';}</script></article>
